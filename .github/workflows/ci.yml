name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: PHP CS / static analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2, phpcs, phpstan
          coverage: none

      - name: Install dependencies
        # magento/* packages resolve from repo.magento.com — provide credentials
        # as the COMPOSER_AUTH repository secret ({"http-basic":{"repo.magento.com":{...}}}).
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: PHP CodeSniffer (Magento Coding Standard)
        run: vendor/bin/phpcs --standard=Magento2 --severity=10 --extensions=php,phtml --ignore=vendor,Test .

      - name: PHPStan
        # Test/Integration needs Magento\TestFramework, only present inside a
        # full Magento dev environment — analysed there, not in this job.
        run: vendor/bin/phpstan analyse --level=6 --no-progress Model Setup Test/Unit

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: xdebug

      - name: Install dependencies
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run unit tests
        run: vendor/bin/phpunit -c Test/Unit/phpunit.xml.dist
