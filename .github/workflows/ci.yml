name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# PHP matrix mirrors the supported Magento window (2.4.6 - 2.4.9):
#   PHP 8.2 -> 2.4.6 / 2.4.7
#   PHP 8.3 -> 2.4.7 / 2.4.8
#   PHP 8.4 -> 2.4.8 / 2.4.9
#   PHP 8.5 -> 2.4.9
# Composer resolves the newest magento/* line each PHP version allows, so the
# matrix exercises the real per-version package sets automatically.

jobs:
  lint:
    name: PHP CS / static analysis
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Add Mage-OS package mirror
        # magento/* packages are not on packagist.org; repo.mage-os.org is a
        # public, auth-free mirror of the Magento package repository.
        # The mirror is canonical for every package name it serves, including a
        # magento-coding-standard metapackage pinned to PHP <= 8.3 — exclude it
        # so the real, PHP-8.4/8.5-compatible releases resolve from packagist.
        run: |
          composer config repositories.mage-os '{"type": "composer", "url": "https://repo.mage-os.org/", "exclude": ["magento/magento-coding-standard", "mage-os/magento-coding-standard"]}'

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: PHP CodeSniffer (Magento Coding Standard)
        run: vendor/bin/phpcs --standard=Magento2 --severity=10 --extensions=php,phtml --ignore=vendor,Test .

      - name: PHPStan
        # Test/Integration needs Magento\TestFramework, only present inside a
        # full Magento dev environment — analysed there, not in this job.
        run: vendor/bin/phpstan analyse -c phpstan.neon --no-progress

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4', '8.5']
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Add Mage-OS package mirror
        # The mirror is canonical for every package name it serves, including a
        # magento-coding-standard metapackage pinned to PHP <= 8.3 — exclude it
        # so the real, PHP-8.4/8.5-compatible releases resolve from packagist.
        run: |
          composer config repositories.mage-os '{"type": "composer", "url": "https://repo.mage-os.org/", "exclude": ["magento/magento-coding-standard", "mage-os/magento-coding-standard"]}'

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run unit tests
        run: vendor/bin/phpunit -c Test/Unit/phpunit.xml.dist --no-coverage
